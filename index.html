<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>필사 노트</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Noto+Sans+KR&family=Noto+Serif+KR&family=Black+Han+Sans&family=Cute+Font&family=Do+Hyeon&family=Dokdo&family=East+Sea+Dokdo&family=Gaegu&family=Gowun+Batang&family=Gowun+Dodum&family=Gugi&family=Hi+Melody&family=Jua&family=Kirang+Haerang&family=Kodchasan&family=Hahmlet&family=IBM+Plex+Sans+KR&family=Nanum+Gothic+Coding&family=Single+Day&family=Sunflower:wght@300;500;700&family=Stylish&family=Poor+Story&family=Yeon+Sung&display=swap" rel="stylesheet">
  <body>

    <div id="sidebar">
      <h2>📝 노트 목록</h2>
      <button onclick="addNote()">+ 새 노트</button>
      <div id="noteList"></div>
    </div>
<button id="toggleBtn" onclick="toggleSidebar()">☰</button>
    <div id="main">
      <div id="toolbar">
        <select id="fontSelect" onchange="changeFont()">
  <option value="'Segoe UI', sans-serif">기본</option>
  <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
  <option value="'Nanum Myeongjo', serif">나눔명조</option>
  <option value="'Noto Sans KR', sans-serif">Noto Sans</option>
  <option value="'Noto Serif KR', serif">Noto Serif</option>
  <option value="'Gowun Batang', serif">고운바탕</option>
  <option value="'Gowun Dodum', sans-serif">고운돋움</option>
  <option value="'Hahmlet', serif">햄릿</option>
  <option value="'IBM Plex Sans KR', sans-serif">IBM Plex</option>
  <option value="'Nanum Gothic Coding', monospace">나눔코딩</option>
  <option value="'Poor Story', cursive">Poor Story</option>
  <option value="'Courier New', monospace">Courier (타자기)</option>
  <option value="'Georgia', serif">Georgia (고전)</option> 
  <option value="'PretendardJP', sans-serif">Pretendard JP</option>
  <option value="'KoPubDotum', sans-serif">KoPub 돋움</option>\
  <option value="'KoPubBatang', serif">KoPub 바탕</option>
  <option value="'Helvetica', sans-serif">Helvetica</option>
  <option value="'RIDIBatang', serif">리디바탕</option>
  <option value="'MaruBuriRegular', serif">마루 부리 중간</option>
  <option value="'BlankScript', sans-serif">Blank Script</option>
  <option value="'RelationshipofMelodrame', sans-serif">Relationship of Melodrame</option>
  
</select>
        <input type="number" id="sizeSelect" value="18" min="8" max="72" onchange="changeSize()"> px
      </div>
      <input id="noteTitle" placeholder="제목을 입력하세요" oninput="saveNote()">
      <textarea id="noteContent" placeholder="여기에 필사를 시작하세요..." oninput="saveNote()"></textarea>
    </div>

    <script src="script.js"></script>
  </body>
</html>
